<!DOCTYPE html>
<html>
<head>
<style>
#conteiner {
    background-color: lightgray;
    width: 960px;
    margin: 0 auto;
    padding: 10px;
}

.texto-destaque {
    font-weight: bold;
}

/*na lista, tira a bolinha e aumenta espaço entre eles*/
ul li {
    list-style: none;
    margin-bottom: 5px;
    /*coloca itens da listas em linha*/
    display:inline;
}

</style>
</head>
<body>
    <div id="conteiner">
        <h1>Titulo do Conteiner</h1>
        <p class="texto-destaque">Conteudo do conteiner</p>
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>

    </div>
</body>
</html>
