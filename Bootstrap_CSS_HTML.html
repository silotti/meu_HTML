<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Utilizando o Sistema de Grid do Bootstrap</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style type="text/css">
div{
    padding: 5px;
    color: #fff;
    font-weight: bold;
}   

.border{
    border: 1px solid #999999;
}

.container{
    background: green;
}
    
.container-fluid{
    margin-top: 50px;
    background: orange;
}
</style>    
</head>
<body>  
<!-- .container: largura definida e responsiva -->
<div class="container text-center">
    <div class="row">
        <div class="col border">Linha1 - Col1</div>
        <div class="col border">Linha1 - Col2</div>
    </div>
    <div class="row">
        <div class="col border">Linha2 - Col1</div>
        <div class="col border">Linha2 - Col2</div>
        <div class="col border">Linha2 - Col3</div>
    </div>
</div>
<!-- .container-fluid: largura total da tela, 100% da tela -->
<div class="container-fluid">
    <div class="row">
        <!-- 4 e 8 =>12 max colunas no bootstrap-->
        <div class="col-4 border">Linha1 - Col1</div>
        <div class="col-8 border">Linha1 - Col2</div>
    </div>
    <div class="row">
        <!-- 6, 3 e 3 =>12 max colunas no bootstrap-->
        <div class="col-6 border">Linha2 - Col1</div>
        <div class="col-3 border">Linha2 - Col2</div>
        <div class="col-3 border">Linha2 - Col3</div>
    </div>


</div>





</body>
</html>
