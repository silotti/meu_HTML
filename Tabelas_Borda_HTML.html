<!DOCTYPE html>
<html>
<head>
<title> TABELA COM BORDAS </title>
</head>
<body>

<h2> Tabela com bordas cabeçalho e rodapé </h2>
<table width="40%" border="1">
<thead>
    <tr>
        <th>Mês</th>
        <th>Horas/Aula</th>
    </tr>

<tbody>
    <tr>
        <td>Junho</td>
        <td>50</td>
    </tr>
    <tr>
        <td>Julho</td>
        <td>50</td>
    </tr>

<tfoot>
    <tr>
        <th>Total</th>
        <th>100</th>
    </tr>
</tfoot>

</body>
</html>
