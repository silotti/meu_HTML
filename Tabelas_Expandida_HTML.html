<!DOCTYPE html>
<html>
<head>
<title> TABELA EXPANDIDA </title>
</head>
<body>

<h2> Tabela com colspan largura da celula dupla</h2>
<!-- Tabela com colspan deixa celula mais larga (dupla)-->
<table width="50%" border="1">
<tr>
    <td>Aluno1-td</td>
    <td colspan="2">Disciplina1-td</td>
</tr>

<tr>
    <td>Alex2-td</td>
    <td>HTML2-td</td>
    <td>Ambiente Web2-td</td>
</tr>
</table>

<!-- Tabela com rowspan deixa celula mais alta (dupla) -->
<table width="50%" border="1">
<h2>Tabela com rowspan altura da celula dupla</h2>
<tr>
    <td>Aluno1-td</td>
    <td rowspan="2">Disciplina1 - linha1-td</td>
</tr>

<tr>
    <td>Alex2-td</td>
    <td>HTML2-pula sozinho Disciplina1-td</td>
    <td>Ambiente Web2-td</td>
</tr>
</body>
</html>
